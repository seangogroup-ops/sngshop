<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SNG Shop Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0e;
  --bg2: #171715;
  --surface: #1e1e1c;
  --surface2: #252523;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #eeeee8;
  --muted: #888882;
  --hint: #555550;
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.12);
  --green-border: rgba(74,222,128,0.25);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.12);
  --amber-border: rgba(251,191,36,0.25);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --accent: #22c55e;
  --r: 8px;
  --rl: 14px;
  --mono: 'Courier New', monospace;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Layout ── */
.wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px 64px; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; flex-wrap: wrap; gap: 12px;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, #16a34a, #15803d);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.brand-sub { font-size: 12px; color: var(--muted); }
.logged-in {
  display: none; align-items: center; gap: 6px;
  font-size: 12px; color: var(--green);
  background: var(--green-dim); border: 1px solid var(--green-border);
  padding: 5px 12px; border-radius: 20px;
}

/* ── Login card ── */
.login-wrap {
  max-width: 460px; margin: 80px auto 0;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--rl); padding: 32px;
}
.login-logo {
  text-align: center; margin-bottom: 24px;
}
.login-logo .icon {
  width: 56px; height: 56px; border-radius: 16px;
  background: linear-gradient(135deg, #16a34a, #15803d);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 12px;
}
.login-logo h1 { font-size: 20px; font-weight: 700; }
.login-logo p { font-size: 13px; color: var(--muted); margin-top: 2px; }
.login-wrap label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
.login-wrap input {
  width: 100%; padding: 11px 14px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text);
  font-size: 14px; font-family: var(--mono);
  outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  margin-bottom: 12px;
}
.login-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
}
.btn-login {
  width: 100%; padding: 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r);
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.02em;
}
.btn-login:hover { opacity: 0.9; }
.btn-login:active { transform: scale(0.99); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-err {
  font-size: 12px; color: var(--red);
  background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--r); padding: 8px 12px;
  margin-top: 10px; display: none;
}

/* ── Stats ── */
.stats {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(0,1fr));
  gap: 10px; margin-bottom: 24px; display: none;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px;
}
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }

/* ── Orders section ── */
#orders-section { display: none; }
.orders-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
}
.orders-bar h2 { font-size: 15px; font-weight: 600; }
.orders-controls { display: flex; gap: 8px; }
select {
  padding: 7px 12px; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--text); font-size: 13px; outline: none;
}
.btn-sm {
  padding: 7px 14px; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--text); font-size: 13px; cursor: pointer;
  transition: background 0.15s;
}
.btn-sm:hover { background: var(--border2); }

/* ── Order card ── */
.order-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rl); padding: 16px 20px;
  margin-bottom: 8px; transition: border-color 0.15s;
}
.order-card:hover { border-color: var(--border2); }
.order-card.pending { border-left: 3px solid var(--amber); }
.order-card.confirmed { border-left: 3px solid var(--green); }
.order-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.order-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.order-id { font-family: var(--mono); font-size: 12px; color: var(--blue); background: var(--blue-dim); padding: 3px 8px; border-radius: 5px; }
.pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.pill-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-border); }
.pill-green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
.pill-gray { background: rgba(255,255,255,0.06); color: var(--muted); }
.order-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 4px 16px; }
.info-row { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.info-row.key { color: var(--green); font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; }
.btn-confirm {
  padding: 8px 16px; background: var(--green-dim);
  border: 1px solid var(--green-border); border-radius: var(--r);
  color: var(--green); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background 0.15s;
}
.btn-confirm:hover { background: rgba(74,222,128,0.2); }

/* ── Modal ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.modal-bg.on { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--rl); padding: 28px;
  max-width: 400px; width: 92%;
}
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel {
  padding: 9px 18px; background: transparent;
  border: 1px solid var(--border2); border-radius: var(--r);
  color: var(--muted); font-size: 13px; cursor: pointer;
  transition: border-color 0.15s;
}
.btn-cancel:hover { border-color: var(--border2); color: var(--text); }
.btn-ok {
  padding: 9px 18px; background: var(--accent);
  border: none; border-radius: var(--r);
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-ok:hover { opacity: 0.9; }
.btn-ok:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Toast ── */
.toast {
  display: none; position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 22px;
  font-size: 13px; z-index: 300;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  max-width: 380px; text-align: center;
}

.empty { text-align: center; padding: 48px; color: var(--hint); font-size: 13px; }

.btn-delete {
  padding: 8px 14px; background: var(--red-dim);
  border: 1px solid rgba(248,113,113,0.25); border-radius: var(--r);
  color: var(--red); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background 0.15s;
}
.btn-delete:hover { background: rgba(248,113,113,0.22); }

.btn-ok-red {
  padding: 9px 18px; background: #ef4444;
  border: none; border-radius: var(--r);
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s;
}
.btn-ok-red:hover { opacity: 0.85; }
.btn-ok-red:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header (ẩn khi chưa login) -->
  <div class="header" id="main-header" style="display:none;">
    <div class="brand">
      <div class="brand-icon">🛍️</div>
      <div>
        <div class="brand-name">SNG Shop</div>
        <div class="brand-sub">Trang quản trị</div>
      </div>
    </div>
    <div class="logged-in" id="logged-badge">✅ Đã đăng nhập</div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Orders -->
  <div id="orders-section">
    <div class="orders-bar">
      <h2>Đơn hàng</h2>
      <div class="orders-controls">
        <select id="filter" onchange="render()">
          <option value="">Tất cả</option>
          <option value="pending">Chờ xác nhận</option>
          <option value="confirmed">Đã xác nhận</option>
        </select>
        <button class="btn-sm" onclick="load()">🔄 Làm mới</button>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <!-- Login (hiện mặc định) -->
  <div class="login-wrap" id="login-wrap">
    <div class="login-logo">
      <div class="icon">🛍️</div>
      <h1>SNG Shop Admin</h1>
      <p>Trang quản trị · Chỉ dành cho admin</p>
    </div>
    <label>Admin Token</label>
    <input type="password" id="token" placeholder="Nhập mật khẩu admin..." />
    <button class="btn-login" onclick="load()">Đăng nhập</button>
    <div class="login-err" id="err"></div>
  </div>

</div>

<!-- Modal xác nhận -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3>Xác nhận đơn hàng</h3>
    <p id="modal-text"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
      <button class="btn-ok" id="btn-ok" onclick="doConfirm()">✅ Xác nhận &amp; Gửi key</button>
    </div>
  </div>
</div>

<!-- Modal xoá đơn hàng -->
<div class="modal-bg" id="modal-del">
  <div class="modal">
    <h3>🗑️ Xoá đơn hàng</h3>
    <p id="modal-del-text"></p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeDelModal()">Huỷ</button>
      <button class="btn-ok-red" id="btn-del-ok" onclick="doDelete()">🗑️ Xoá</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://sng-shop.vercel.app';
let orders = [], pending = null;

const $ = id => document.getElementById(id);
const token = () => $('token').value.trim();

function toast(msg, ms = 3500) {
  const el = $('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', ms);
}

function err(msg) {
  const el = $('err');
  el.textContent = msg; el.style.display = msg ? 'block' : 'none';
}

async function load() {
  const t = token();
  if (!t) { err('Vui lòng nhập Admin Token'); return; }

  const btn = document.querySelector('.btn-login');
  btn.disabled = true; btn.textContent = 'Đang xác thực...';
  err('');

  try {
    const r = await fetch(API + '/api/list-orders', {
      headers: { Authorization: 'Bearer ' + t }
    });
    const d = await r.json();

    if (!d.ok) {
      err(d.error || 'Token không hợp lệ');
      btn.disabled = false; btn.textContent = 'Đăng nhập';
      return;
    }

    // Đã login thành công
    $('login-wrap').style.display = 'none';
    $('main-header').style.display = 'flex';
    $('logged-badge').style.display = 'flex';
    $('stats').style.display = 'grid';
    $('orders-section').style.display = 'block';

    orders = d.orders || [];
    renderStats();
    render();
    toast('✅ Đã tải ' + orders.length + ' đơn hàng');
  } catch (e) {
    err('Lỗi kết nối: ' + e.message);
  }

  btn.disabled = false; btn.textContent = 'Đăng nhập';
}

function renderStats() {
  const total = orders.length;
  const pend = orders.filter(o => o.status === 'pending').length;
  const conf = orders.filter(o => o.status === 'confirmed').length;
  const rev = orders.filter(o => o.status === 'confirmed').reduce((s, o) => s + (o.amount || 0), 0);
  $('stats').innerHTML = [
    { label: 'Tổng đơn', val: total },
    { label: 'Chờ xác nhận', val: pend },
    { label: 'Đã xác nhận', val: conf },
    { label: 'Doanh thu', val: rev.toLocaleString('vi-VN') + 'đ' },
  ].map(s => `<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-val">${s.val}</div></div>`).join('');
}

function render() {
  const f = $('filter').value;
  const list = f ? orders.filter(o => o.status === f) : orders;
  const el = $('list');
  if (!list.length) { el.innerHTML = '<div class="empty">Không có đơn hàng nào.</div>'; return; }

  el.innerHTML = list.map(o => {
    const ip = o.status === 'pending';
    const date = new Date(o.created_at).toLocaleString('vi-VN');
    return `
    <div class="order-card ${o.status}">
      <div class="order-top">
        <div style="flex:1;min-width:0;">
          <div class="order-head">
            <span class="order-id">${o.order_id}</span>
            <span class="pill ${ip ? 'pill-amber' : 'pill-green'}">${ip ? '⏳ Chờ xác nhận' : '✅ Đã xác nhận'}</span>
            <span class="pill pill-gray">${o.plan_name || o.plan} · ${o.days || '?'} ngày</span>
          </div>
          <div class="order-info">
            <div class="info-row">✉️ ${o.email}</div>
            <div class="info-row">💰 ${(o.amount||0).toLocaleString('vi-VN')}đ</div>
            <div class="info-row">📅 ${date}</div>
            <div class="info-row">📋 ${o.content || '—'}</div>
            ${o.key ? `<div class="info-row key">🔑 ${o.key}</div>` : ''}
          </div>
        </div>
        ${ip ? `<button class="btn-confirm" onclick="openModal('${o.order_id}','${(o.plan_name||o.plan).replace(/'/g,"\\'")}','${o.email.replace(/'/g,"\\'")}')">✅ Xác nhận</button>` : ''}
        <button class="btn-delete" onclick="openDelModal('${o.id}','${o.order_id || 'null'}','${o.email.replace(/'/g,"\\'")}')">🗑️ Xoá</button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id, plan, email) {
  pending = id;
  $('modal-text').textContent = `Xác nhận đơn ${id} (${plan}) cho ${email}? Key sẽ được tạo và gửi email tự động.`;
  $('modal').classList.add('on');
}

function closeModal() {
  $('modal').classList.remove('on');
  pending = null;
}

async function doConfirm() {
  if (!pending) return;
  const btn = $('btn-ok');
  btn.disabled = true; btn.textContent = 'Đang xử lý...';
  try {
    const r = await fetch(API + '/api/confirm-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token() },
      body: JSON.stringify({ order_id: pending })
    });
    const d = await r.json();
    closeModal();
    if (d.ok) {
      toast(d.warning ? '⚠️ Đã xác nhận nhưng gửi email thất bại. Key: ' + d.key : '✅ Thành công! Key: ' + d.key, 5000);
      load();
    } else {
      toast('❌ Lỗi: ' + (d.error || 'Không xác định'), 4000);
    }
  } catch (e) {
    toast('❌ Lỗi kết nối: ' + e.message, 4000);
    closeModal();
  }
  btn.disabled = false; btn.textContent = '✅ Xác nhận & Gửi key';
}

$('token').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
$('modal').addEventListener('click', e => { if (e.target === $('modal')) closeModal(); });
$('modal-del').addEventListener('click', e => { if (e.target === $('modal-del')) closeDelModal(); });

let pendingDel = null;

function openDelModal(id, orderId, email) {
  pendingDel = id;
  $('modal-del-text').textContent = `Bạn có chắc muốn xoá đơn hàng ${orderId} của ${email}? Hành động này không thể hoàn tác.`;
  $('modal-del').classList.add('on');
}

function closeDelModal() {
  $('modal-del').classList.remove('on');
  pendingDel = null;
}

async function doDelete() {
  if (!pendingDel) return;
  const btn = $('btn-del-ok');
  btn.disabled = true; btn.textContent = 'Đang xoá...';
  try {
    const r = await fetch(API + '/api/delete-order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token() },
      body: JSON.stringify({ id: pendingDel })
    });
    const d = await r.json();
    closeDelModal();
    if (d.ok) {
      toast('🗑️ Đã xoá đơn hàng thành công', 3000);
      load();
    } else {
      toast('❌ Lỗi xoá: ' + (d.error || 'Không xác định'), 4000);
    }
  } catch (e) {
    toast('❌ Lỗi kết nối: ' + e.message, 4000);
    closeDelModal();
  }
  btn.disabled = false; btn.textContent = '🗑️ Xoá';
}
</script>
</body>
</html>
